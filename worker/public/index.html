<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Chat App</title>
		<link rel="stylesheet" href="chat.css" />
	</head>
	<body>
		<div class="app-shell">
			<aside id="thread-sidebar" class="thread-sidebar" aria-label="Chat threads">
				<div class="sidebar-header">
					<button id="new-thread-button" class="sidebar-primary-button" type="button">
						New chat
					</button>
					<button
						id="sidebar-close-button"
						class="icon-button sidebar-close-button"
						type="button"
						aria-label="Close chat list"
					>
						×
					</button>
				</div>
				<div class="thread-list-wrap">
					<div class="thread-list-toolbar">
						<button id="new-group-button" class="new-group-button" type="button" aria-label="Create group">
							+
						</button>
					</div>
					<ul id="thread-list" class="thread-list"></ul>
				</div>
			</aside>

			<button
				id="sidebar-backdrop"
				class="sidebar-backdrop"
				type="button"
				aria-label="Close chat list"
			></button>

			<div id="name-modal" class="name-dialog" aria-hidden="true">
				<div id="name-dialog-panel" class="name-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="name-dialog-title">
					<div class="name-dialog-header">
						<h2 id="name-dialog-title" class="name-dialog-title">Edit name</h2>
						<button id="name-dialog-close" class="name-dialog-close" type="button" aria-label="Close dialog">
							×
						</button>
					</div>
					<form id="name-dialog-form" class="name-dialog-form">
						<label class="name-dialog-field" for="name-dialog-input">Name</label>
						<input id="name-dialog-input" class="name-dialog-input" type="text" autocomplete="off" />
						<p id="name-dialog-error" class="name-dialog-error" aria-live="polite"></p>
						<div class="name-dialog-actions">
							<button id="name-dialog-cancel" class="name-dialog-button secondary" type="button">Cancel</button>
							<button id="name-dialog-submit" class="name-dialog-button primary" type="submit">Save</button>
						</div>
					</form>
				</div>
			</div>

			<main class="chat-panel">
				<button id="sidebar-toggle" class="icon-button" type="button" aria-label="Open chat list">
					☰
				</button>

				<div class="chat-container">
					<div id="chat-messages" class="chat-messages"></div>

					<div class="typing-indicator" id="typing-indicator">
						AI is thinking...
					</div>

					<div class="message-input">
						<textarea
							id="user-input"
							placeholder="Type your message here..."
							rows="1"
							autofocus
						></textarea>
						<button id="send-button" type="button">Send</button>
					</div>
				</div>
			</main>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/marked@17.0.4/lib/marked.umd.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.2/dist/purify.min.js"></script>
		<script src="chat.js"></script>
	</body>
</html>
