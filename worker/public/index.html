<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Chat App</title>
		<style>
			:root {
				--primary-color: rgb(67, 160, 71);
				--primary-hover: rgb(36, 108, 41);
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #bae19b;
				--assistant-msg-bg: #f3f4f6;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html {
				height: 100%;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				/*max-width: 800px;*/
				margin: 0 auto;
				padding: 1rem;
				height: 100%;
			}

			header {
				text-align: center;
				margin-bottom: 2rem;
				padding: 1rem 0;
				border-bottom: 1px solid var(--border-color);
			}

			h1 {
				font-size: 1.5rem;
				color: var(--primary-color);
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: 100%;/*calc(100vh - 200px);
				min-height: 400px;*/
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem;
				background-color: var(--light-bg);
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border-radius: 8px;
				max-width: 80%;
			}

			.message > p,
			.message > div > p {
				margin: 0;
				overflow-wrap: anywhere;
			}

			.message > p:first-child {
				white-space: pre-line;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				align-self: flex-end;
				margin-left: auto;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				align-self: flex-start;
			}

			.error-message {
				background-color: #fee2e2;
				border-left: 4px solid #dc2626;
				color: #991b1b;
			}

			.error-message p,
			.error-message div {
				color: #991b1b;
			}

			.message-input {
				display: flex;
				align-items: flex-end;
				gap: 0.75rem;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: white;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				font-size: 1rem;
				resize: none;
				min-height: 44px;
				max-height: 240px;
				overflow-y: hidden;
			}

			#send-button {
				flex-shrink: 0;
				min-height: 44px;
				padding: 0.75rem 1.25rem;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 10px;
				font-size: 0.95rem;
				font-weight: 600;
				line-height: 1;
				cursor: pointer;
				align-self: flex-end;
				box-shadow: 0 10px 24px rgba(67, 160, 71, 0.18);
				transition:
					background-color 0.2s,
					transform 0.2s,
					box-shadow 0.2s;
			}

			#send-button:hover {
				background-color: var(--primary-hover);
				transform: translateY(-1px);
				box-shadow: 0 12px 28px rgba(36, 108, 41, 0.24);
			}

			#send-button:disabled {
				background-color: var(--text-light);
				cursor: not-allowed;
				box-shadow: none;
				transform: none;
			}

			@media (max-width: 640px) {
				.message-input {
					flex-direction: column;
					align-items: stretch;
				}

				#send-button {
					width: 100%;
				}
			}

			.typing-indicator {
				display: none;
				font-style: italic;
				color: var(--text-light);
				padding: 1rem;
				background-color: var(--assistant-msg-bg);
			}

			.typing-indicator.visible {
				display: block;
			}

			footer {
				margin-top: 1rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
			}

			/* Markdown styling */
			.message h1,
			.message h2,
			.message h3,
			.message h4,
			.message h5,
			.message h6 {
				margin: 0.5rem 0;
				font-weight: 600;
			}

			.message h1 {
				font-size: 1.5rem;
			}
			.message h2 {
				font-size: 1.3rem;
			}
			.message h3 {
				font-size: 1.1rem;
			}

			.message ul,
			.message ol {
				margin: 0.5rem 0;
				padding-left: 1.5rem;
			}

			.message li {
				margin: 0.25rem 0;
			}

			.message code {
				background-color: rgba(0, 0, 0, 0.05);
				padding: 0.125rem 0.25rem;
				border-radius: 3px;
				font-family: "Courier New", monospace;
				font-size: 0.9em;
			}

			.message pre {
				background-color: #1e1e1e;
				color: #d4d4d4;
				padding: 1rem;
				border-radius: 6px;
				overflow-x: auto;
				margin: 0.5rem 0;
			}

			.message pre code {
				background-color: transparent;
				padding: 0;
				color: inherit;
				font-size: 0.875rem;
			}

			.message blockquote {
				border-left: 3px solid var(--border-color);
				padding-left: 1rem;
				margin: 0.5rem 0;
				color: var(--text-light);
			}

			.message a {
				color: var(--primary-color);
				text-decoration: none;
			}

			.message a:hover {
				text-decoration: underline;
			}

			.message table {
				border-collapse: collapse;
				margin: 0.5rem 0;
				width: 100%;
			}

			.message th,
			.message td {
				border: 1px solid var(--border-color);
				padding: 0.5rem;
				text-align: left;
			}

			.message th {
				background-color: var(--light-bg);
				font-weight: 600;
			}

			.message hr {
				border: none;
				border-top: 1px solid var(--border-color);
				margin: 1rem 0;
			}

			.message img {
				max-width: 100%;
				height: auto;
				border-radius: 4px;
			}
		</style>
	</head>
	<body>
		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<div>
						<p>
							Hello! I'm the CTC chat app! How can I help you today? I'm eager to find some bugs!
						</p>
					</div>
				</div>
			</div>

			<div class="typing-indicator" id="typing-indicator">
				AI is thinking...
			</div>

			<div class="message-input">
				<textarea
					id="user-input"
					placeholder="Type your message here..."
					rows="1"
					autofocus
				></textarea>
				<button id="send-button">Send</button>
			</div>
		</div>

		<!-- Markdown parser -->
		<script src="https://cdn.jsdelivr.net/npm/marked@17.0.4/lib/marked.umd.js"></script>
		<!-- Sanitize HTML -->
		<script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.2/dist/purify.min.js"></script>
		<!-- Chat app script -->
		<script src="chat.js"></script>
	</body>
</html>
